name: Deploy to Retinbox Web Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build and Deploy to Retiehe
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        run: |
          curl -fSL https://host.retiehe.com/cli -o /tmp/rth-cli.js
          node /tmp/rth-cli.js --site kigtts.lhtstudio.com --build build --outdir dist
