# KIGTTS 隐私政策

最后更新：2026-05-09

本隐私政策适用于 Android 应用 **KIGTTS**（包名：`com.lhtstudio.kigtts.app`）。

KIGTTS 是一款面向 kigurumi 玩家、漫展和现场交流场景的本地辅助工具，主要功能包括便捷字幕、本地语音识别、TTS 朗读、快捷名片、音效板、画板、二维码扫描、悬浮窗、音量热键、语音包和识别资源管理等。

KIGTTS 默认以**设备本地处理**为主。除非你主动使用下载、分享、打开外链、跳转第三方应用等功能，应用不会把你的音频、图片、字幕、名片、音效、预设或说话人样本上传到开发者自建服务器。

## 1. 个人信息处理者

- 应用名称：KIGTTS
- 应用包名：`com.lhtstudio.kigtts.app`
- 个人信息处理者 / 应用提供者：KIGTTS 项目维护者（LHTStudio）
- 反馈渠道：可通过 KIGTTS 项目的公开仓库、发布页或应用发布渠道提交问题反馈。

## 2. 我们处理哪些数据

KIGTTS 会根据你实际启用的功能，访问或处理以下数据。

### 2.1 麦克风音频

当你启用语音识别、按住说话、开关模式、说话人验证、音频测试等功能时，应用会读取麦克风音频。

用途包括：

- 本地实时语音识别与字幕上屏
- 本地 TTS 前处理、语音增强、VAD、降噪、回声处理
- 说话人验证与本人样本录制
- 音频测试、设备路由测试与回放

这些音频默认在设备本地处理。KIGTTS 不会默认把麦克风音频上传到开发者自建服务器。

### 2.2 相机画面、图片和二维码内容

当你使用二维码扫描功能时，应用会访问相机画面；当你主动选择图片进行识别时，应用会读取你选择的图片。

用途包括：

- 在本地识别二维码或条码内容
- 根据二维码类型提示你打开网页、复制内容，或跳转微信、QQ、支付宝等第三方应用处理

### 2.3 你主动导入、选择或创建的文件

当你使用内建文件管理器、系统文件选择器、系统图库、语音包安装、音效导入、预设导入导出、名片背景图设置等功能时，应用可能读取你主动选择的文件或目录。

这类文件可能包括：

- 语音包、Kokoro 资源包、语音识别资源包
- 便捷字幕预设包、音效板预设包
- 音效音频文件、音频剪辑结果
- 快捷名片背景图、头像、二维码相关图片
- 日志文件、导出的预设文件或你主动选择分享的其它文件

用途包括：

- 导入、解压、安装、转码、剪辑、预览、播放、导出或分享
- 在应用内生成对应功能内容

### 2.4 你在应用内创建或保存的内容

KIGTTS 会在设备本地保存你主动创建、编辑或触发的内容，例如：

- 便捷字幕分组、快捷文本条目、快捷文本预设
- 快捷名片标题、备注、链接、背景图路径、排序信息
- 音效板分组、音效条目、关键词、音频文件路径、音效板预设
- 语音识别结果、字幕历史记录、输入草稿、朗读队列状态
- 说话人验证样本、验证阈值和最近匹配信息
- 悬浮窗、热键、主题、布局、音频、识别和文件管理设置
- 应用日志和故障排查信息

这些内容用于恢复你的配置、显示历史记录、触发音效关键词、管理本地资源和排查故障。

### 2.5 已安装应用列表和快捷方式信息

当你添加悬浮窗启动器应用、配置第三方快捷方式或配置音量热键目标时，KIGTTS 可能读取设备中可启动应用的名称、包名、图标和系统公开的启动入口信息。

用途包括：

- 在应用列表中展示可添加的应用
- 保存你选择的悬浮窗启动器项目
- 为音量热键或悬浮窗长按菜单提供跳转目标
- 为微信、QQ、支付宝等常用扫码入口提供你主动触发的快捷跳转

这些信息默认仅在本地使用，不会上传到开发者自建服务器。

### 2.6 无障碍相关数据

当且仅当你主动开启“KIGTTS 音量热键辅助”无障碍服务后，应用会使用无障碍能力执行以下功能：

- 更稳定地监听音量键序列热键
- 在你主动触发“QQ 扫一扫（无障碍）”时，辅助识别 QQ 当前界面节点并执行必要点击或手势，以便直达 QQ 扫一扫页面
- 显示无障碍开启引导悬浮窗，帮助你完成系统设置

无障碍功能默认关闭。KIGTTS 不会使用无障碍功能读取你的聊天内容、密码、支付密码或其它非本应用功能所需的信息。你可以随时在系统无障碍设置中关闭该服务。

### 2.7 蓝牙媒体标题字幕

如果你主动开启“蓝牙媒体标题字幕”功能，KIGTTS 会把当前大字幕内容写入 Android 系统媒体会话的标题信息。

用途包括：

- 让部分蓝牙歌词屏、车机、小屏设备或系统媒体界面把当前字幕显示为媒体标题
- 在 TTS 播放结束后一段时间内继续保留字幕，便于阅读

该功能可能会覆盖其它媒体应用显示的标题信息。关闭该功能后，KIGTTS 将停止主动发布该类媒体标题字幕。

### 2.8 权限状态、设备状态和运行日志

为了完成上述功能，KIGTTS 可能读取或记录与功能直接相关的状态信息，例如：

- 麦克风、相机、媒体读取、通知、悬浮窗、无障碍等权限状态
- 音频输入/输出设备类型和名称，例如扬声器、蓝牙、有线、USB 设备
- 音量变化状态，用于非无障碍音量热键
- 当前 TTS、ASR、VAD、音频增强、语音包和资源包配置
- 应用运行日志、错误日志、导入导出结果和调试信息

日志默认保存在本地。只有当你主动分享日志时，日志内容才会发送给你选择的目标应用或联系人。

## 3. 我们如何使用这些数据

我们仅将上述数据用于实现你可见、可预期并主动启用的功能，包括：

- 本地语音识别、字幕显示、输入预览和 TTS 朗读
- 本地音频增强、回声消除、降噪、说话人验证和音频测试
- 便捷字幕、快捷名片、画板、音效板、语音包和资源包管理
- 二维码扫描、二维码内容识别和对应应用跳转
- 悬浮窗、迷你控件、热键和第三方快捷方式联动
- 蓝牙媒体标题字幕显示
- 本地日志记录、故障排查和用户主动分享的支持信息

KIGTTS 不会将上述数据用于广告画像、商业营销画像或与本应用功能无关的自动化决策。

## 4. 数据是否会上传、共享或转让

### 4.1 默认情况

默认情况下，KIGTTS 不提供开发者自建账号系统、云端同步系统、广告系统或统计后台，不会默认把你的音频、图片、文本、名片、音效、预设、说话人样本或应用列表上传到开发者自建服务器。

### 4.2 你主动触发的联网下载

当你主动下载语音识别资源包、Kokoro 资源包或打开下载源时，应用会访问你选择的下载源，例如魔搭、Hugging Face、HF-Mirror 或你自定义的资源地址。

下载源服务器可能接收必要的网络请求信息，例如 IP 地址、访问时间、请求文件路径和 User-Agent。该部分由对应下载源按照其自身规则处理。

### 4.3 你主动触发的分享、导出和跳转

如果你主动执行以下操作，相关数据可能会被发送给你选择的目标应用、网站或联系人：

- 使用系统分享面板分享文本、日志、名片、预设或文件
- 打开二维码中包含的网址
- 跳转到微信、QQ、支付宝、浏览器或其它第三方应用
- 在应用内或系统浏览器中打开网页内容
- 导出语音包、便捷字幕预设、音效板预设或日志文件

这些行为属于你主动发起的跨应用、跨网站或跨设备交互。目标应用、网站或联系人将按照其自身规则处理相关数据。

### 4.4 系统组件和第三方 SDK

KIGTTS 使用 Android 系统组件和若干第三方开源 / 本地功能组件来完成基础功能，例如 AndroidX、CameraX、ML Kit Barcode Scanning、ZXing、ONNX Runtime、sherpa-onnx、CanHub Image Cropper、Apache Commons Compress、XZ、Material Components 等。

这些组件主要用于界面、相机预览、二维码识别、模型推理、图片裁剪、压缩包处理和本地音频能力。KIGTTS 不会把它们用于广告追踪或用户画像。

当你使用系统 TTS、系统文件选择器、系统图库、WebView、相机组件、无障碍服务或第三方应用时，相关系统或第三方服务可能根据其自身隐私政策处理必要数据。该部分不受 KIGTTS 单独控制。

### 4.5 转让和公开披露

KIGTTS 不会出售你的个人信息，也不会在未经你同意的情况下公开披露你的个人信息。若因法律法规、行政或司法机关依法要求必须提供相关信息，我们会在符合法律要求的范围内处理。

## 5. 权限说明

KIGTTS 可能请求以下权限。你可以拒绝或关闭其中大部分权限，但对应功能可能无法正常使用。

| 权限或能力 | 用途 |
| --- | --- |
| 麦克风 | 语音识别、按住说话、音频测试、说话人验证 |
| 相机 | 二维码扫描 |
| 图片 / 音频 / 存储读取 | 导入图片、音频、预设、语音包、资源包，选择名片背景图 |
| 悬浮窗 | 在其它应用上方显示 KIGTTS 悬浮控件、迷你控件和引导窗口 |
| 通知 / 前台服务 | 保持悬浮窗、音量热键、实时语音链路等功能运行并显示系统提示 |
| 无障碍 | 仅在你主动开启后，用于稳定监听音量键和 QQ 扫一扫直达辅助 |
| 网络 | 下载资源包、打开外链、访问你配置的下载源或二维码网址 |
| 唤醒锁 / 前台服务类型 | 在语音、悬浮窗、热键或媒体标题字幕相关功能运行时维持必要的后台任务 |

## 6. 你的选择与控制

你可以通过以下方式管理自己的数据和权限：

- 在系统设置中关闭麦克风、相机、媒体读取、通知、悬浮窗或无障碍权限
- 在应用设置中关闭蓝牙媒体标题字幕、音量热键、无障碍稳定监听、快捷文本触发音效等可选功能
- 在应用内删除便捷字幕、名片、音效、语音包、资源包、历史记录、日志或预设
- 使用系统设置清除 KIGTTS 应用数据
- 卸载 KIGTTS
- 删除你在外部目录中保存或导出的文件

由于 KIGTTS 默认不建立开发者服务器端账户和云端存储，我们通常无法代你远程删除设备本地数据。你可以直接在设备本地完成删除。

## 7. 数据存储和保留

KIGTTS 会把设置、预设、音效、名片、日志、导入资源和部分运行状态保存在设备本地应用目录或你主动选择的目录中。

这些数据通常会保留到以下情形之一发生为止：

- 你在应用内手动删除
- 你在系统设置中清除应用数据
- 你卸载应用
- 你删除自己选择的外部文件或目录内容

如果你将文件导出到外部目录或分享给第三方应用，导出后的副本将不再受 KIGTTS 应用内删除操作控制。

## 8. 数据安全

KIGTTS 尽量按最小必要原则设计功能：

- 核心语音识别、字幕、TTS、音频处理和二维码识别以本地处理为主
- 权限按功能需要请求，不使用时可关闭
- 无障碍功能默认关闭，并在应用中说明用途
- 不默认接入开发者自建云端收集系统、广告系统或统计后台
- 导入、导出、分享等跨应用行为需要你主动触发

但请注意，任何移动设备、操作系统、第三方应用、蓝牙设备、存储介质或网络环境都不可能绝对零风险。请根据自己的设备安全状态谨慎使用相关功能。

## 9. 未成年人说明

KIGTTS 不以未成年人为主要目标用户。如未成年人需要使用本应用，建议在监护人知情和指导下使用。监护人可以通过系统权限管理、应用内删除、清除应用数据或卸载应用来管理相关内容和权限。

## 10. 隐私政策的更新

如果 KIGTTS 的功能、权限使用方式、数据处理方式或第三方组件发生实质变化，我们可能更新本隐私政策，并在应用内、官网页面或发布说明中同步更新。

更新后的版本以最新发布日期为准。继续使用相关功能，即表示你已了解更新后的政策内容；如果你不同意相关变化，可以停止使用对应功能、关闭权限或卸载应用。
