# KIGTTS Trainer 隐私政策

最近更新日期：2026-04-24

本隐私政策适用于 KIGTTS Trainer 桌面训练器（下称“本软件”）。本软件的核心目标是帮助用户在本地完成语音语料准备、模型蒸馏、Piper 训练、语音包导出及相关预览操作。

## 1. 我们处理哪些信息

本软件在你主动使用对应功能时，可能处理以下数据：

- 你导入的音频文件、文本语料、头像图片、旧训练项目文件。
- 你选择的本地模型目录、运行时目录、输出目录与缓存目录。
- 你在训练设置中填写的参数、说明文本、备注信息与预览文本。
- 本软件生成的中间文件与输出文件，例如 metadata、切分音频、蒸馏语料、训练日志、导出的 `.kigvpk`、试听音频等。
- 你主动触发在线下载时涉及的运行时依赖、模型权重下载地址和下载状态信息。

## 2. 数据默认如何处理

本软件默认以本地处理为主。

- 训练准备、语料处理、蒸馏、Piper 训练、导出和大部分预览逻辑默认在你的设备本地执行。
- 本软件不会默认把你的音频、文本语料、项目文件或训练结果上传到开发者服务器。
- 本软件不会默认启用遥测、广告标识符、云端账号系统或后台统计上报。

## 3. 哪些场景会发生联网

只有在你主动使用需要联网的功能时，本软件才会访问第三方服务或镜像源，例如：

- 在线安装或重建运行时，例如 micromamba、Python 依赖、CUDA 相关依赖、PyTorch 轮子等。
- 在线下载 VoxCPM2、denoiser 等模型权重，或访问 ModelScope、PyPI、Conda、PyTorch wheel 镜像站。
- 你点击应用内的外部链接按钮后，由系统浏览器打开第三方网页。

在这些场景下：

- 你的网络请求会直接发送到对应第三方服务，而不是先经过开发者自建服务器。
- 第三方服务可能根据其自身规则记录你的 IP 地址、请求时间、User-Agent、下载行为等信息。
- 第三方服务的数据处理规则不受本软件控制，应以对应服务自己的隐私政策、服务条款和镜像说明为准。

## 4. 本地存储与缓存

为了保证训练流程可恢复、可继续执行，本软件会在你的设备上保存必要的本地数据，包括但不限于：

- 用户主动选择的输出目录及其 `work` 子目录。
- 用户数据目录中的运行时、模型缓存、下载缓存和配置记录。
- GPT-SoVITS、VoxCPM2、Piper 标准流程相关的项目状态文件、日志文件和中间音频。
- 你在界面中保存到本地配置存储的部分最近使用参数，例如 GPT-SoVITS 根目录、模式选择、蒸馏参数等。

这些数据主要用于：

- 恢复旧项目继续训练。
- 避免重复扫描、重复下载或重复生成素材。
- 显示运行时状态、模型状态、训练日志和进度信息。

## 5. 旧项目继续训练相关说明

当你使用“从旧项目继续训练”功能时，本软件可能读取项目目录中的：

- `work/kigtts_project.json`
- `work/metadata.csv`
- 项目内缓存的原始音频、蒸馏音频、参考音频和导出文件

这些信息仅用于判断：

- 项目模式与历史训练参数
- 素材是否完整
- 是否需要重新切分、重新 ASR 或重新生成缺失音频

## 6. 日志与错误信息

本软件会在本地显示并保存部分日志、错误信息与调试信息，以帮助你定位训练失败、下载失败、模型缺失或环境异常等问题。

这些日志可能包含：

- 本地文件路径
- 模型目录路径
- 运行时目录路径
- 错误堆栈
- 第三方命令输出摘要

除非你主动导出并分享这些日志，否则它们不会被自动上传给开发者。

## 7. 我们不会默认做的事情

在当前版本下，本软件不会默认：

- 收集你的麦克风实时音频并上传到开发者服务器。
- 收集你的账号密码、支付信息或通讯录。
- 在后台持续监听与你训练流程无关的本地文件。
- 在你未触发相关功能时自动联网下载模型或依赖。
- 把你的训练结果自动同步到云端。

## 8. 你对数据的控制方式

你可以通过以下方式控制你的数据：

- 自行决定是否导入音频、文本、头像和项目文件。
- 自行决定是否启用在线运行时安装、模型下载和外链跳转。
- 手动清理输出目录、缓存目录、旧项目目录与用户数据目录中的相关文件。
- 使用应用内“清除工作缓存”功能删除部分中间产物。
- 删除用户数据目录中保存的运行时、模型、配置和日志文件。

## 9. 第三方内容与用户责任

你导入、下载、调用或生成的模型、音频、文本与输出内容，可能受到第三方许可证、服务条款、署名要求或其他法律义务约束。

你需要自行确认：

- 外部模型、镜像和整合包的来源是否合法。
- 训练素材和参考音频是否有权使用。
- 导出的声音包、预览音频和相关作品是否符合适用的法律、平台规则和许可证要求。

## 10. 未成年人说明

如果你是未成年人，请在监护人指导下使用本软件，并在导入音频、文本、模型或公开发布生成内容前，确认相关行为的风险与责任。

## 11. 政策更新

如果本软件后续加入账号系统、联网同步、崩溃上报、远程服务或其他新的数据处理场景，本隐私政策应同步更新。更新后的版本将以应用内文本和仓库文档为准。

## 12. 联系与反馈

如果你对本隐私政策或本软件的数据处理方式有疑问，可以通过以下公开渠道反馈：

- GitHub 仓库：`https://github.com/LHT02/KIGTTS`
- 制作团队主页：请从 KIGTTS 官网“鸣谢”页面进入对应成员主页

## 13. 简要结论

当前版本的 KIGTTS Trainer 以本地处理为核心，不默认向开发者服务器上传你的训练数据。只有在你主动触发依赖下载、模型下载或打开外部链接时，才会与相应第三方服务发生联网交互。
